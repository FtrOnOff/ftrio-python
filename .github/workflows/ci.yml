name: CI

# Run the full quality gate on every push and pull request: lint, type-check,
# and the test suite across every supported Python version.
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package with dev dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Ruff (lint)
        run: ruff check ftrio playground tests

      - name: Mypy (type-check)
        run: mypy ftrio

      - name: Pytest (with coverage)
        run: pytest --cov=ftrio --cov-report=term-missing
