name: Publish to PyPI

# Builds the sdist + wheel and publishes them to PyPI when a GitHub Release is
# published. Authentication uses PyPI Trusted Publishing (OIDC): there are no API
# tokens or secrets to manage; PyPI verifies the workflow's identity directly.
#
# One-time setup (outside this repo):
#   1. On PyPI, add a Trusted Publisher for the "ftrio" project pointing at this
#      repository, the workflow file "publish.yml", and the environment "pypi".
#   2. In GitHub repo settings, create an Environment named "pypi" (optionally with
#      required reviewers so a human approves each release).
#
# Trigger it by publishing a GitHub Release (tag the commit, e.g. v1.0.0). Use the
# workflow_dispatch entry to dry-run the build job without publishing.
on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build:
    name: Build distributions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Guard against tag/version drift: pyproject.toml is the source of truth for
      # the published version, and the release tag does not set it. Fail fast if a
      # release is tagged with a version that does not match pyproject.toml, so a
      # mismatched number can never reach PyPI. Only meaningful on a real release
      # (a manual workflow_dispatch run has no version tag, so it is skipped).
      - name: Verify the release tag matches pyproject.toml version
        if: github.event_name == 'release'
        run: |
          tag_version="${GITHUB_REF_NAME#v}"
          project_version="$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml', 'rb'))['project']['version'])")"
          echo "Release tag      : ${GITHUB_REF_NAME} (normalized: ${tag_version})"
          echo "pyproject version: ${project_version}"
          if [ "${tag_version}" != "${project_version}" ]; then
            echo "::error::Release tag '${GITHUB_REF_NAME}' does not match pyproject.toml version '${project_version}'. Bump [project] version in pyproject.toml to match the tag (or fix the tag) and re-release."
            exit 1
          fi

      - name: Build sdist and wheel
        run: |
          python -m pip install --upgrade pip build
          python -m build

      - name: Check the built distributions
        run: |
          python -m pip install --upgrade twine
          python -m twine check dist/*

      - name: Upload distributions as a workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI
    # Only publish on an actual release, never on a manual dry-run build.
    if: github.event_name == 'release'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/ftrio/
    permissions:
      # Required for Trusted Publishing (OIDC); no PyPI token needed.
      id-token: write
    steps:
      - name: Download built distributions
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
