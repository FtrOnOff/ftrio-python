name: Publish to PyPI

# Builds the sdist + wheel and publishes them to PyPI when a GitHub Release is
# published. Authentication uses PyPI Trusted Publishing (OIDC): there are no API
# tokens or secrets to manage; PyPI verifies the workflow's identity directly.
#
# One-time setup (outside this repo):
#   1. On PyPI, add a Trusted Publisher for the "ftrio" project pointing at this
#      repository, the workflow file "publish.yml", and the environment "pypi".
#   2. In GitHub repo settings, create an Environment named "pypi" (optionally with
#      required reviewers so a human approves each release).
#
# Trigger it by publishing a GitHub Release (tag the commit, e.g. v1.0.0). Use the
# workflow_dispatch entry to dry-run the build job without publishing.
on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build:
    name: Build distributions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build sdist and wheel
        run: |
          python -m pip install --upgrade pip build
          python -m build

      - name: Check the built distributions
        run: |
          python -m pip install --upgrade twine
          python -m twine check dist/*

      - name: Upload distributions as a workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI
    # Only publish on an actual release, never on a manual dry-run build.
    if: github.event_name == 'release'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/ftrio/
    permissions:
      # Required for Trusted Publishing (OIDC); no PyPI token needed.
      id-token: write
    steps:
      - name: Download built distributions
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
